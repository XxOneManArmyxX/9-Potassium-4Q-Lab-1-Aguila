<!DOCTYPE html>
<html>
<head>
    <title>My First Webpage</title>
    <meta charset="UTF-8">
    <meta name="author" content="Genaro Antonio M. Aguila">
</head>
<body>
    <form name="checkout-form" action="checkout.html" onsubmit="return validateForm()">
        <label for="name">Enter your name: </label>
        <input type="text" name="name" id="name" required>
        <br><br>

        <label for="amountWater">Enter Quantity of Bottled Water: </label>
        <input type="number" name="amountWater" id="amountWater" placeholder="Price: $2"required>
        <br><br>

        <label for="amountSandwiches">Enter Quantity of Sandwiches: </label>
        <input type="number" name="amountSandwiches" id="amountSandwiches" placeholder="Price: $5" required>
        <br><br>

        <label for="amount">How much money do you have?: </label>
        <input type="number" name="amount" id="amount" required>
        <br><br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
